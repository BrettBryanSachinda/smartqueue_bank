<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Teller Login — SmartQueue</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #0B1A2E;
            --gold: #C9A84C;
            --white: #FFFFFF;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--navy);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: var(--white);
        }

        .login-card {
            background: var(--white);
            color: var(--navy);
            width: 350px;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .logo { font-family: 'Playfair Display', serif; font-size: 28px; margin-bottom: 10px; }
        .logo span { color: var(--gold); }
        .subtitle { color: #888; font-size: 14px; margin-bottom: 30px; }

        form { display: flex; flex-direction: column; gap: 15px; }

        input {
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 14px;
            font-family: 'DM Sans', sans-serif;
        }

        button {
            background: var(--navy);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover { background: var(--gold); color: var(--navy); }
        
        .error { color: red; font-size: 12px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo">Smart<span>Queue</span></div>
        <div class="subtitle">Staff Access Portal</div>

        {% if form.errors %}
            <div class="error">Invalid username or password. Please try again.</div>
        {% endif %}

        <form method="POST">
    {% csrf_token %} 
    <input type="text" name="username" placeholder="Username">
    <input type="password" name="password" placeholder="Password">
    <button type="submit">Log In</button>
    <p style="text-align: center; margin-top: 15px; font-size: 14px;">
    New Teller? <a href="{% url 'signup' %}" style="color: #0056b3; text-decoration: none;">Register here</a>.
</p>
</form>

   
    </div>

</body>
</html>
