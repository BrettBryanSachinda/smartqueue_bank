<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Ticket — SmartQueue</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --navy: #0B1A2E; --gold: #C9A84C; --white: #FFFFFF; }

        body {
            font-family: 'DM Sans', sans-serif; background-color: var(--navy);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; color: var(--white);
            background-image: 
                linear-gradient(rgba(201,168,76,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(201,168,76,0.03) 1px, transparent 1px);
            background-size: 48px 48px;
        }

        .ticket-card {
            background: var(--white); color: var(--navy); width: 100%; max-width: 380px;
            border-radius: 20px; padding: 40px; text-align: center;
            box-shadow: 0 24px 64px rgba(0,0,0,0.4); position: relative;
            margin: 20px;
        }

        /* The receipt cutout effect */
        .ticket-card::before, .ticket-card::after {
            content: ''; position: absolute; width: 40px; height: 40px;
            background: var(--navy); border-radius: 50%; top: 68%;
        }
        .ticket-card::before { left: -20px; }
        .ticket-card::after { right: -20px; }

        .logo { font-family: 'Playfair Display', serif; font-size: 26px; margin-bottom: 20px; font-weight: 700; }
        .logo span { color: var(--gold); }

        .label { color: #8B96A8; text-transform: uppercase; font-weight: 700; font-size: 11px; letter-spacing: 1px; }
        
        .ticket-num {
            font-family: 'Playfair Display', serif; font-size: 56px; font-weight: 700;
            color: var(--navy); margin: 15px 0; border-top: 2px dashed rgba(11,26,46,0.1);
            border-bottom: 2px dashed rgba(11,26,46,0.1); padding: 20px 0;
        }

        .qr-section { margin: 25px 0; }
        /* Using the backend-generated base64 image */
        .qr-section img { width: 160px; height: 160px; border-radius: 10px; border: 1px solid rgba(11,26,46,0.1); padding: 5px; }

        .info-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
            margin-top: 20px; text-align: left; font-size: 14px;
        }

        .value { font-weight: 700; margin-top: 6px; color: var(--navy); }

       .btn-print {
            margin-top: 35px; background: var(--navy); color: var(--white);
            border: none; padding: 14px 20px; border-radius: 12px; font-family: 'DM Sans', sans-serif;
            font-weight: 700; font-size: 14px; cursor: pointer; width: 100%; transition: 0.2s;
            box-sizing: border-box; /* This keeps the button perfectly inside the card */
        }
        .btn-print:hover { opacity: 0.9; transform: translateY(-1px); }
        
        .btn-track {
            margin-top: 12px; background: rgba(201, 168, 76, 0.1); color: #B38E36;
            border: 1px solid var(--gold); padding: 14px 20px; border-radius: 12px; 
            font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 14px; 
            cursor: pointer; width: 100%; display: block; text-decoration: none; transition: 0.2s;
            box-sizing: border-box; /* This keeps the button perfectly inside the card */
        }
        .btn-track:hover { background: rgba(201, 168, 76, 0.2); }

        .new-checkin-link { margin-top: 20px; font-size: 13px; }
        .new-checkin-link a { color: var(--gold); text-decoration: none; font-weight: 600; }

        @media print {
            .btn-print, .btn-track, .new-checkin-link { display: none !important; }
            body { background: white; align-items: flex-start; padding: 0; }
            .ticket-card { box-shadow: none; margin: 0; padding: 20px; width: 100%; max-width: 100%; }
            .ticket-card::before, .ticket-card::after { display: none; }
        }
    </style>
</head>
<body>

    <div class="ticket-card">
        <div class="logo">Smart<span>Queue</span></div>
        
        <div class="label">Your Ticket Number</div>
        <div class="ticket-num">{{ ticket.ticket_number }}</div>

        <div class="qr-section">
            <img src="data:image/png;base64,{{ qr_code }}" alt="Secure Ticket QR Code">
            <p style="font-size: 12px; color: #8B96A8; margin-top: 10px;">Scan at counter</p>
        </div>

        <div class="info-grid">
            <div>
                <div class="label">Customer</div>
                <div class="value">{{ ticket.customer_name }}</div>
            </div>
            <div>
                <div class="label">Service</div>
                <div class="value">{{ ticket.service.name }}</div>
            </div>
            <div>
                <div class="label">Est. Wait</div>
                <div class="value">~{{ wait_time }} mins</div>
            </div>
            <div>
                <div class="label">Date</div>
                <div class="value">{{ ticket.created_at|date:"d M Y" }}</div>
            </div>
        </div>

        <button class="btn-print" onclick="window.print()">Print Physical Ticket</button>
        <a href="{% url 'track_ticket' ticket.id %}" class="btn-track">Track Live Progress 📱</a>
        <p class="new-checkin-link"><a href="{% url 'check_in' %}">← Back to Kiosk</a></p>
    </div>

</body>
</html>
